version: "3.9"
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bta
      POSTGRES_PASSWORD: bta_dev
      POSTGRES_DB: bta_voting
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bta -d bta_voting"]
      interval: 5s
      timeout: 5s
      retries: 5

  # backend:
  #   build: ./backend
  #   env_file: ./backend/.env
  #   ports:
  #     - "8080:8080"
  #   depends_on:
  #     db:
  #       condition: service_healthy

volumes:
  pgdata:
